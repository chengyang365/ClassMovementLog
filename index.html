<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>电子出入记录系统</title>
    <!-- 添加这一行：使用 SVG 渲染 Emoji -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://em-content.zobj.net/source/apple/419/door_1f6aa.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://em-content.zobj.net/source/apple/419/door_1f6aa.png">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/source/apple/419/door_1f6aa.png">
    
     <!-- 1. 核心库 (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 2. 样式 -->
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn95 { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInFromRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInFromBottom { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulseRed { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); border-color: #fca5a5; } 50% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.4); border-color: #ef4444; } }

        .animate-in { animation-duration: 0.3s; animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); animation-fill-mode: both; }
        .fade-in { animation-name: fadeIn; }
        .zoom-in-95 { animation-name: zoomIn95; }
        .slide-in-from-right { animation-name: slideInFromRight; }
        .slide-in-from-bottom-4 { animation-name: slideInFromBottom; }
        .animate-pulse-red { animation: pulseRed 2s infinite; }
        .chart-container { position: relative; width: 100%; height: 300px; max-height: 400px; margin: auto; }
    </style>
</head>
<body class="bg-slate-200 text-slate-800 h-screen w-full overflow-hidden p-2 sm:p-4 md:p-6 font-sans select-none">

    <div id="root" class="w-full h-full"></div>

    <!-- 3. React 应用逻辑 -->
    <script type="text/babel">
        const { useState, useEffect, useRef, memo } = React;

        // ==========================================
        // ⚠️ 请在这里填入您的 Google Apps Script URL
        // 注意：这里只能放网址，请不要将学生名单粘贴到这里。
        // 学生名单请在系统的“后台管理 -> 编辑班级 -> 导入CSV”中导入。
        // ==========================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYXYBnU5uzfzkM_F71KFxQyeTcNOTEeuQQaY6wgVmDCa5Leu0b_zZk5E5uC26vGD4pXQ/exec"; 

        // --- 独立时钟组件 ---
        const DigitalClock = memo(() => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            return (
                <div className="text-right shrink-0">
                    <div className="text-2xl sm:text-4xl md:text-5xl font-mono font-bold text-blue-600 tracking-tight">
                        {time.toLocaleTimeString('en-US', { hour12: true, hour: 'numeric', minute: '2-digit' })}
                    </div>
                    <div className="text-slate-400 font-medium text-[10px] sm:text-xs md:text-sm mt-0 sm:mt-1">
                        {time.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}
                    </div>
                </div>
            );
        });

        // --- 图标组件 ---
        const Icon = ({ name, className, size = 24, ...props }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current) {
                    containerRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    const iconName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    i.setAttribute('data-lucide', iconName);
                    containerRef.current.appendChild(i);
                    lucide.createIcons({
                        root: containerRef.current,
                        nameAttr: 'data-lucide',
                        attrs: { class: className, width: size, height: size, ...props }
                    });
                }
            }, [name, className, size, JSON.stringify(props)]);
            return <span ref={containerRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        // --- 辅助函数 ---
        const parseName = (fullName) => {
            if (!fullName) return { cn: '', my: '' };
            const cnMatch = fullName.match(/[\u4e00-\u9fa5]+/g);
            const cn = cnMatch ? cnMatch.join('') : '';
            const my = fullName.replace(/[\u4e00-\u9fa5]+/g, '').replace(/[()（）]/g, '').replace(/\s+/g, ' ').trim();
            return { cn, my };
        };

        // --- 核心配置 ---
        const TEACHERS = [
            "En Tan Hau Vind 陈皓运师", "En Yap Min Yan 叶民彦师", "Cik Ong Wen Jing 王文静师", "Pn Lee Yoke Yean 李育燕师", "Cik Oi Swee Chien 黄翠涓师",
            "Pn Rinny Seah Kwee Jean 佘桂仁师", "En Chong Cheng Yang 张政扬师", "Pn Tan Hui Kee 陈惠琪师", "Cik Nabila Binti Suhaimi", "Pn Chin Lee Mei 陈丽美师",
            "Pn Chiam Ai Ying 詹爱莹师", "En Winson Eng Wei Siang 黄伟祥师", "Cik Leong Siew Fern 梁筱芬师", "Cik Lim Sie Pei 林诗佩师", "Cik Tan Lee Ching 陈丽清师",
            "En Lim Kian Pin 林建品师", "En Willson Lim 林伟胜师", "Cik Lim Hui Ying 林卉颖师", "Cik Tay Sue Ching 郑淑琴师", "Pn Ngu Ling Houng 吴霖芳师",
            "Cik Heng Wui Sing 邢伟芯师", "Pn Koo Cheng Yee 古倩仪师", "Pn Ng Dong Yu 黄董宇师", "En Tan Sik Hong 陈实丰师", "Pn Lee Siow Mee 李晓梅师",
            "Pn Cher Ruey Ming 曹瑞敏师", "Pn Chua Chea Leng 蔡静玲师"
        ];
        const TEACHER_CLASS_ORDER = ['3A', '3B', '3C', '3D', '3E', '4A', '4B', '4C', '4D', '5A', '5B', '5C', '5D', '5E', '6A', '6B', '6C', '1A', '1B', '1C', '1D', '1E', '2A', '2B', '2C', '2D', '2E'];
        
        const REASONS = [
            { id: 'tandas', label: '厕所', labelMy: 'Tandas', icon: '🚽', color: 'bg-blue-50 border-blue-200 text-blue-700 hover:bg-blue-100 hover:border-blue-400' },
            { id: 'pejabat', label: '办公室', labelMy: 'Pejabat', icon: '🏢', color: 'bg-purple-50 border-purple-200 text-purple-700 hover:bg-purple-100 hover:border-purple-400' },
            { id: 'guru', label: '见老师', labelMy: 'Jumpa Guru', icon: '👩‍🏫', color: 'bg-orange-50 border-orange-200 text-orange-700 hover:bg-orange-100 hover:border-orange-400' },
            { id: 'lain', label: '其他', labelMy: 'Lain-lain', icon: '❓', color: 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100 hover:border-slate-400' }
        ];
        const PRESET_OTHER_REASONS = [
            { label: '图书馆', labelMy: 'Perpustakaan', icon: '📚' },
            { label: '辅导室', labelMy: 'Bilik Kaunseling', icon: '🛋️' },
            { label: '医疗室', labelMy: 'Bilik Sakit', icon: '🚑' },
            { label: '食堂', labelMy: 'Kantin', icon: '🍽️' },
            { label: '装水/洗手', labelMy: 'Isi Air/Basuh', icon: '🚰' },
            { label: '拿东西', labelMy: 'Ambil Barang', icon: '🎒' }
        ];

        const generateDefaultClasses = () => {
            const currentYear = new Date().getFullYear();
            const structure = [
                { level: 1, classes: ['A', 'B', 'C', 'D', 'E'] }, { level: 2, classes: ['A', 'B', 'C', 'D', 'E'] },
                { level: 3, classes: ['A', 'B', 'C', 'D', 'E'] }, { level: 4, classes: ['A', 'B', 'C', 'D'] },
                { level: 5, classes: ['A', 'B', 'C', 'D', 'E'] }, { level: 6, classes: ['A', 'B', 'C'] },
            ];
            const teacherMap = {};
            TEACHER_CLASS_ORDER.forEach((cls, index) => { if (TEACHERS[index]) teacherMap[cls] = TEACHERS[index]; });
            const students1A = ["Aidan Liew 廖伟健", "Chong Wei Han 张伟汉", "Nurul Aisyah", "Siti Aminah", "Tan Yi Xuan 陈一轩", "Muthu Kumar", "Lee Zi Yang 李子洋", "Wong Mei Ling 黄美玲", "Jayden Lim 林杰登", "Damia Batrisya", "Lucas Tan 陈卢卡斯", "Sofia Zara", "Ng Kai Lun 黄凯伦", "Rania Eryna", "Teoh Zhi Ming 张志明", "Zara Sophia", "Ahmad Ali", "Brendan Low 刘布登", "Chloe Tan 陈克洛伊", "Danial Arif"];
            let allClasses = [];
            structure.forEach(grade => {
                grade.classes.forEach(cls => {
                    const className = `${grade.level}${cls}`;
                    allClasses.push({ id: `${className.toLowerCase()}_${currentYear}`, name: `${className} (${currentYear})`, teacher: teacherMap[className] || 'Guru Kelas', students: className === '1A' ? students1A : [] });
                });
            });
            return allClasses;
        };

        const DEFAULT_CLASSES = generateDefaultClasses();

        // --- 云端同步函数 ---
        const syncToCloud = (payload) => {
            if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("YOUR_SCRIPT_URL_HERE")) return;
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(err => console.error("Cloud Sync Error:", err));
        };

        // --- 组件: UserAvatar ---
        const UserAvatar = ({ name, size = "md", active = false }) => {
            const { cn, my } = parseName(name);
            let initials = "?";
            if (my && my.length > 0) initials = my.split(' ').slice(0, 2).map(n => n[0]).join('').toUpperCase();
            else if (cn && cn.length > 0) initials = cn[0];
            const colorIndex = name.length % 6;
            const colors = ['bg-red-100 text-red-600', 'bg-orange-100 text-orange-600', 'bg-amber-100 text-amber-600', 'bg-green-100 text-green-600', 'bg-blue-100 text-blue-600', 'bg-indigo-100 text-indigo-600'];
            
            // 更精细的响应式尺寸控制
            let sizeClass = "w-10 h-10 text-sm";
            if (size === "lg") sizeClass = "w-10 h-10 sm:w-12 sm:h-12 text-sm sm:text-lg";
            if (size === "sm") sizeClass = "w-8 h-8 text-xs";
            
            const colorClass = active ? "bg-white/20 text-white" : colors[colorIndex];
            return <div className={`${sizeClass} ${colorClass} rounded-full flex items-center justify-center font-bold shrink-0 shadow-sm transition-all`}>{initials}</div>;
        };

        // --- 主 App 组件 ---
        function App() {
            const [classes, setClasses] = useState(DEFAULT_CLASSES);
            const [activeClassId, setActiveClassId] = useState(null); 
            const [view, setView] = useState('landing'); 
            const [logs, setLogs] = useState([]);
            const [attendanceData, setAttendanceData] = useState({}); 
            const [tempAbsentees, setTempAbsentees] = useState([]); 
            const [assignedClassIds, setAssignedClassIds] = useState([]); 
            
            // 核心状态：选中的学生
            const [selectedOutStudents, setSelectedOutStudents] = useState([]); 
            const [selectedReturnIds, setSelectedReturnIds] = useState([]); 
            
            const [showCustomReasonInput, setShowCustomReasonInput] = useState(false);
            const [customReasonText, setCustomReasonText] = useState('');
            const [confirmReturnId, setConfirmReturnId] = useState(null); 
            const [globalModal, setGlobalModal] = useState(null); 
            const [adminPasswordInput, setAdminPasswordInput] = useState('');
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [editingClass, setEditingClass] = useState(null); 
            const [statsView, setStatsView] = useState('monthly'); 
            const [statsTab, setStatsTab] = useState('overview'); 
            const [isExamMode, setIsExamMode] = useState(false); 
            const [mobileTab, setMobileTab] = useState('out'); // 新增：移动端标签页状态 ('out' 或 'in')

            // 数据加载
            useEffect(() => {
                try {
                    const savedClasses = localStorage.getItem('school_classes');
                    if (savedClasses) setClasses(JSON.parse(savedClasses)); else setClasses(DEFAULT_CLASSES);
                    const savedLogs = localStorage.getItem('school_logs'); if(savedLogs) setLogs(JSON.parse(savedLogs));
                    const savedAtt = localStorage.getItem('school_attendance'); if(savedAtt) setAttendanceData(JSON.parse(savedAtt));
                    const savedIds = localStorage.getItem('device_assigned_class_ids'); if(savedIds) setAssignedClassIds(JSON.parse(savedIds));
                    const savedExam = localStorage.getItem('school_exam_mode'); if(savedExam) setIsExamMode(JSON.parse(savedExam));
                } catch (error) { console.error("Load Error", error); }
            }, []);

            // 数据保存
            useEffect(() => { localStorage.setItem('school_classes', JSON.stringify(classes)); }, [classes]);
            useEffect(() => { localStorage.setItem('school_logs', JSON.stringify(logs)); }, [logs]);
            useEffect(() => { localStorage.setItem('school_attendance', JSON.stringify(attendanceData)); }, [attendanceData]);
            useEffect(() => { localStorage.setItem('school_exam_mode', JSON.stringify(isExamMode)); }, [isExamMode]);
            useEffect(() => { localStorage.setItem('device_assigned_class_ids', JSON.stringify(assignedClassIds)); }, [assignedClassIds]);

            const getActiveClass = () => classes.find(c => c.id === activeClassId);
            const formatTime = (dateObj) => dateObj ? new Date(dateObj).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) : '-';
            const formatDate = (dateObj) => new Date(dateObj).toLocaleDateString('en-GB');
            const getTodayString = () => new Date().toLocaleDateString('en-CA'); 
            const getCurrentAbsentees = (classId) => { const record = attendanceData[classId]; return (record && record.date === getTodayString()) ? (record.absent || []) : []; };

            // --- 核心逻辑 ---
            const fetchStudentsFromCloud = async () => {
                if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("YOUR_SCRIPT_URL_HERE")) return setGlobalModal({ type: 'alert', title: '未设置 URL', message: '请在代码中填入 Google Apps Script URL', isDanger: true });
                setGlobalModal({ type: 'alert', title: '同步中...', message: '正在从 Google Sheet 下载学生名单...\nSedang memuat turun senarai nama...' });
                
                try {
                    const res = await fetch(GOOGLE_SCRIPT_URL); 
                    const cloudData = await res.json();
                    if(cloudData.error) throw new Error(cloudData.error);
                    const newClasses = classes.map(c => {
                        const shortName = c.name.split(' ')[0];
                        const cloudList = cloudData[shortName];
                        if (cloudList && Array.isArray(cloudList)) { return { ...c, students: cloudList }; }
                        return c;
                    });
                    setClasses(newClasses);
                    setGlobalModal({ type: 'alert', title: '成功 / Berjaya', message: '学生名单已更新！\nSenarai murid telah dikemaskini.', confirmText: 'OK' });
                } catch (e) {
                    setGlobalModal({ type: 'alert', title: '失败 / Gagal', message: '同步失败，请检查网络或 Sheet 设置。\n' + e.message, isDanger: true });
                }
            };

            const handleEnterClass = (classId) => { setActiveClassId(classId); setSelectedOutStudents([]); setSelectedReturnIds([]); setView('dashboard'); setMobileTab('out'); }; // 重置 mobileTab
            const handleAdminLogin = () => { if (adminPasswordInput === "1234") { setView('admin'); setShowAdminLogin(false); setAdminPasswordInput(''); } else { setGlobalModal({ type: 'alert', title: 'Error', message: 'Wrong Password.' }); } };
            
            // 优化：点选学生
            const toggleStudentSelection = (name) => {
                const isOut = logs.find(log => log.classId === activeClassId && log.name === name && !log.timeIn);
                if(isOut) return; // Ignore clicks on already out students
                if(selectedOutStudents.includes(name)) setSelectedOutStudents(prev => prev.filter(n => n !== name));
                else setSelectedOutStudents(prev => [...prev, name]);
            };
            
            const toggleTempAbsent = (name) => { if(tempAbsentees.includes(name)) setTempAbsentees(prev=>prev.filter(n=>n!==name)); else setTempAbsentees(prev=>[...prev, name]); };

            // 优化：直接确认外出并记录原因
            const executeExit = (reasonObj, specificText='') => {
                if (selectedOutStudents.length === 0) return;
                const finalReason = specificText ? `${reasonObj.label} (${specificText})` : reasonObj.label;
                const now = new Date();
                const newLogs = selectedOutStudents.map((name, i) => {
                    const logId = Date.now() + i + Math.random();
                    syncToCloud({
                        action: 'log_out', id: logId, date: now.toLocaleDateString('en-GB'),
                        timeOut: now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true}),
                        className: getActiveClass().name, name: name, reason: finalReason
                    });
                    return {
                        id: logId, classId: activeClassId, date: now.toISOString(), name: name,
                        timeOut: now.toISOString(), timeIn: null, reason: reasonObj.label, 
                        reasonDisplay: finalReason, reasonId: reasonObj.id
                    };
                });
                setLogs([...newLogs, ...logs]);
                setSelectedOutStudents([]); // 关键：清空选中状态
                setShowCustomReasonInput(false); 
                setCustomReasonText('');
                setMobileTab('in'); // 外出成功后，在移动端自动切换到在外列表
            };

            const handleConfirmExit = (reasonObj) => { 
                if (reasonObj.id === 'lain') { setShowCustomReasonInput(true); return; } 
                executeExit(reasonObj); 
            };
            
            const submitCustomReason = () => { const lainReasonObj = REASONS.find(r => r.id === 'lain'); executeExit(lainReasonObj, customReasonText); };

            // 优化：直接处理学生回来，无需确认
            const handleStudentReturn = (id) => {
                const now = new Date();
                const updatedLogs = logs.map(log => {
                    if (log.id === id) {
                        const dur = Math.round((now - new Date(log.timeOut))/60000) + ' min';
                        const timeInStr = now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
                        syncToCloud({ action: 'log_in', id: id, timeIn: timeInStr, duration: dur });
                        return { ...log, timeIn: now.toISOString() };
                    }
                    return log;
                });
                setLogs(updatedLogs); 
                
                // 如果在外名单空了，自动切回点选外出标签
                if (logs.filter(log => log.classId === activeClassId && !log.timeIn).length <= 1) {
                    setMobileTab('out');
                }
            };

            const handleBatchReturn = () => {
                if (selectedReturnIds.length === 0) return;
                setGlobalModal({ type: 'confirm', title: '确认回来', message: `确认让选中的 ${selectedReturnIds.length} 人回来？`, onConfirm: () => {
                    const now = new Date();
                    const updatedLogs = logs.map(log => {
                        if (selectedReturnIds.includes(log.id)) {
                            const dur = Math.round((now - new Date(log.timeOut))/60000) + ' min';
                            const timeInStr = now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
                            syncToCloud({ action: 'log_in', id: log.id, timeIn: timeInStr, duration: dur });
                            return { ...log, timeIn: now.toISOString() };
                        }
                        return log;
                    });
                    setLogs(updatedLogs); setSelectedReturnIds([]);
                }});
            };

            const handleSaveAttendance = (list) => {
                const today = getTodayString();
                setAttendanceData(prev => ({...prev, [activeClassId]: {date: today, absent: list}}));
                syncToCloud({ action: 'save_attendance', className: getActiveClass().name, absentList: list });
                setGlobalModal({ type:'alert', title:'成功', message:'点名已保存并同步。', onConfirm: ()=>setView('dashboard') });
            };

            const handleExportData = () => {
                const data = { classes, logs, attendanceData, assignedClassIds, isExamMode, backupDate: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `SJKC_Log_Backup_${getTodayString()}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            };

            const handleExportClassLogsCSV = () => {
                const cls = getActiveClass(); if (!cls) return;
                const classLogs = logs.filter(log => log.classId === activeClassId);
                let csvContent = "Date,Name,Time Out,Time In,Reason,Duration (Min)\n";
                classLogs.forEach(log => {
                    const duration = log.timeIn ? Math.round((new Date(log.timeIn) - new Date(log.timeOut)) / 1000 / 60) : '';
                    const safeName = `"${log.name}"`;
                    const reason = log.reasonDisplay || log.reason;
                    const row = `${formatDate(log.date)},${safeName},${formatTime(log.timeOut)},${formatTime(log.timeIn) || 'Still Out'},"${reason}",${duration}`;
                    csvContent += row + "\n";
                });
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `${cls.name}_Logs_${getTodayString()}.csv`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            };
            
            const handleImportData = (event) => {
                const file = event.target.files[0]; if (!file) return;
                if(!window.confirm("警告：恢复备份将覆盖当前所有数据！\nAwas: Data semasa akan diganti!")) { event.target.value = ''; return; }
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.classes) setClasses(data.classes);
                        if (data.logs) setLogs(data.logs);
                        if (data.attendanceData) setAttendanceData(data.attendanceData);
                        if (data.assignedClassIds) setAssignedClassIds(data.assignedClassIds);
                        if (data.isExamMode !== undefined) setIsExamMode(data.isExamMode);
                        setGlobalModal({ type: 'alert', title: '恢复成功 / Berjaya', message: '数据已成功恢复！', onConfirm: () => window.location.reload() });
                    } catch (err) { setGlobalModal({ type: 'alert', title: '错误 / Ralat', message: '文件格式错误！', isDanger: true }); }
                };
                reader.readAsText(file);
            };

                         const cleanParts = parts.map(p => p.replace(/^["']|["']$/g, '').trim()).filter(p => p);
                         if (cleanParts.length === 0) return null;
                         const rowStr = cleanParts.join(' ').toLowerCase();
                         const ignoreKeywords = ['bil', 'no', 'id', 'code', 'name', 'nama', 'catatan', 'remark', 'note', 'class', 'kelas', 'year', 'tahun', 'gender', 'jantina', 'sex', 'lelaki', 'perempuan', 'male', 'female', 'agama', 'kaum', 'race', 'religion', 'tarikh', 'date', 'lahir', 'birth', 'mykid', 'kp', 'ic', 'warganegara', 'citizen', '姓名', '名字', '性命', '学生', '班级', '编号', '学号', '备注', '注释', '身份证', '种族', '宗教', '出生日期', '性别'];
                         const isHeader = cleanParts.some(p => { const s = p.toLowerCase().replace(/[^a-z0-9.]/g, ''); return ['id', 'no', 'no.', 'bil', 'code'].includes(s); }) || ignoreKeywords.some(k => rowStr.includes(k) && !['id', 'no', 'bil'].includes(k)) || /^[\d\s\-\.\/]+$/.test(rowStr) || rowStr.length < 2;
                         if (isHeader) return null;

                         let mixedName = null, cnName = null, myName = null;
                         for (const part of cleanParts) {
                             if (/^[\d\s\-\.\/]+$/.test(part) || part.length < 2) continue;
                             const hasChinese = /[\u4e00-\u9fa5]/.test(part);
                             const hasLatin = /[a-zA-Z]/.test(part);
                             if (hasChinese && hasLatin) { if (!mixedName || part.length > mixedName.length) mixedName = part; }
                             else if (hasChinese) { if (!cnName || part.length > cnName.length) cnName = part; }
                             else if (hasLatin) { if (!myName || part.length > myName.length) { myName = part; } }
                         }
                         if (mixedName) return mixedName;
                         if (cnName && myName) return `${myName} ${cnName}`; 
                         if (cnName) return cnName;
                         if (myName) return myName; 
                         return null;

                     } else {

                     }

                                            return (
                                              <div key={key} className="bg-white rounded-xl sm:rounded-2xl p-4 sm:p-6 shadow-sm border border-slate-200">
                                                 <div className="flex justify-between items-end mb-4 sm:mb-6 border-b border-slate-100 pb-3 sm:pb-4"><div><h3 className="text-xl sm:text-2xl font-bold text-slate-800">{data.label}</h3><p className="text-slate-500 text-xs sm:text-sm">{data.labelMy}</p></div><div className="text-right"><div className="text-3xl sm:text-4xl font-black text-blue-600">{data.total}</div><div className="text-[10px] sm:text-xs text-slate-400 font-bold uppercase">Total</div></div></div>
                                                 <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                                                    <div><h4 className="font-bold text-slate-700 mb-2 sm:mb-3 text-xs sm:text-sm flex items-center gap-1.5 sm:gap-2"><Icon name="pie-chart" size={14} className="sm:w-[16px] sm:h-[16px]"/> 原因分布</h4><div className="space-y-1.5 sm:space-y-2">{REASONS.map(r => (<div key={r.id} className="flex items-center text-[10px] sm:text-xs"><div className="w-16 sm:w-20 text-slate-500 truncate pr-1">{r.label}</div><div className="flex-grow bg-slate-100 h-1.5 sm:h-2 rounded-full overflow-hidden"><div className="bg-blue-500 h-full" style={{width: `${(data.reasons[r.id]||0)/data.total*100}%`}}></div></div><div className="w-6 sm:w-8 text-right font-bold text-slate-700">{data.reasons[r.id]||0}</div></div>))}</div></div>
                                                    <div><h4 className="font-bold text-slate-700 mb-2 sm:mb-3 text-xs sm:text-sm flex items-center gap-1.5 sm:gap-2"><Icon name="users" size={14} className="sm:w-[16px] sm:h-[16px]"/> 高频学生</h4><div className="space-y-1.5 sm:space-y-2">{sortedStudents.map(([name, count], i) => (<div key={name} className="flex justify-between items-center text-[10px] sm:text-xs bg-slate-50 p-1.5 sm:p-2 rounded"><span className="font-bold text-slate-700 truncate max-w-[120px] sm:max-w-[150px]">{i+1}. {name}</span><span className="font-bold text-blue-600">{count}次</span></div>))}</div></div>
                                                 </div>
                                              </div>
                                            );
                                        })}
                                    </div>
                                 </React.Fragment>
                               )}
                               {statsTab === 'time' && (
                                 <div className="bg-white p-4 sm:p-8 rounded-xl sm:rounded-3xl shadow-sm border border-slate-200 min-h-[300px] sm:min-h-[400px]">
                                    <h3 className="text-xl sm:text-2xl font-bold text-slate-800 mb-4 sm:mb-6 flex items-center gap-2"><Icon name="clock" className="text-blue-500 w-5 h-5 sm:w-6 sm:h-6"/> 时段分析 (Time Analysis)</h3>
                                    <div className="flex items-end gap-2 sm:gap-4 h-48 sm:h-64 mt-6 sm:mt-10 overflow-x-auto pb-4 custom-scrollbar">
                                        {sortedTimeKeys.map(time => { 
                                            const count = agg.timeOfDay[time]; const max = Math.max(...Object.values(agg.timeOfDay)); const height = `${(count / max) * 100}%`; 
                                            const [h] = time.split(':'); const hourInt = parseInt(h, 10); const ampm = hourInt >= 12 ? 'PM' : 'AM'; const hour12 = hourInt % 12 || 12; const displayTime = `${hour12} ${ampm}`; 
                                            return (<div key={time} className="flex flex-col items-center group w-12 sm:w-16 shrink-0"><div className="relative w-full flex justify-center h-full items-end"><div className="w-full bg-blue-100 rounded-t-lg group-hover:bg-blue-200 transition-colors relative" style={{ height: height }}><div className="absolute -top-6 sm:-top-8 left-1/2 -translate-x-1/2 font-bold text-blue-600 text-xs sm:text-base">{count}</div></div></div><div className="mt-2 text-[10px] sm:text-sm font-bold text-slate-500 whitespace-nowrap">{displayTime}</div></div>); 
                                        })}
                                    </div>
                                    <p className="text-center text-slate-400 mt-2 sm:mt-4 text-[10px] sm:text-sm">显示每个小时的离开人次</p>
                                 </div>
                               )}
                               {statsTab === 'day' && (
                                  <div className="bg-white p-4 sm:p-8 rounded-xl sm:rounded-3xl shadow-sm border border-slate-200 min-h-[300px] sm:min-h-[400px]">
                                    <h3 className="text-xl sm:text-2xl font-bold text-slate-800 mb-4 sm:mb-6 flex items-center gap-2"><Icon name="calendar-days" className="text-green-500 w-5 h-5 sm:w-6 sm:h-6"/> 星期趋势 (Day Trends)</h3>
                                    <div className="space-y-3 sm:space-y-4 mt-4 sm:mt-8">
                                        {sortedDayKeys.map(day => { 
                                            const count = agg.dayOfWeek[day] || 0; const max = Math.max(...Object.values(agg.dayOfWeek), 1); const width = `${(count / max) * 100}%`; 
                                            return (<div key={day} className="flex items-center gap-2 sm:gap-4"><div className="w-16 sm:w-24 font-bold text-slate-600 text-[10px] sm:text-sm text-right leading-tight">{day.split('/')[0]}<br className="sm:hidden"/><span className="text-[8px] sm:text-[10px] opacity-70">{day.split('/')[1]}</span></div><div className="flex-grow bg-slate-100 h-6 sm:h-8 rounded-full overflow-hidden relative"><div className="h-full bg-green-500 rounded-full flex items-center justify-end px-2 sm:px-3 text-white font-bold text-[10px] sm:text-xs transition-all duration-500" style={{ width: width }}>{count > 0 && count}</div></div></div>); 
                                        })}
                                    </div>
                                  </div>
                               )}
                               {statsTab === 'duration' && (
                                 <div className="space-y-4 sm:space-y-6">
                                     <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                                         <div className="bg-white p-4 sm:p-6 rounded-xl sm:rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center justify-center py-6 sm:py-10"><div className="bg-orange-50 p-3 sm:p-4 rounded-full text-orange-500 mb-2 sm:mb-4"><Icon name="timer" size={32} className="sm:w-[40px] sm:h-[40px]"/></div><div className="text-3xl sm:text-5xl font-black text-slate-800 mb-1">{agg.duration.count > 0 ? Math.round(agg.duration.total / agg.duration.count) : 0} <span className="text-sm sm:text-xl font-medium text-slate-400">min</span></div><div className="text-slate-500 font-bold text-xs sm:text-base">平均外出时长 / Purata Masa</div></div>
                                         <div className="bg-white p-4 sm:p-6 rounded-xl sm:rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center justify-center py-6 sm:py-10"><div className="bg-red-50 p-3 sm:p-4 rounded-full text-red-500 mb-2 sm:mb-4"><Icon name="alert-octagon" size={32} className="sm:w-[40px] sm:h-[40px]"/></div><div className="text-3xl sm:text-5xl font-black text-slate-800 mb-1">{agg.duration.longOut.length} <span className="text-sm sm:text-xl font-medium text-slate-400">次</span></div><div className="text-slate-500 font-bold text-xs sm:text-base">超时记录 ({'>'}20分钟)</div></div>
                                     </div>
                                     <div className="bg-white p-4 sm:p-6 rounded-xl sm:rounded-3xl shadow-sm border border-slate-200">
                                         <h4 className="font-bold text-slate-800 mb-3 sm:mb-4 flex items-center gap-1.5 sm:gap-2 text-sm sm:text-base"><Icon name="settings" className="text-slate-400 w-4 h-4 sm:w-5 sm:h-5"/> 超时详情列表</h4>
                                         <div className="overflow-x-auto custom-scrollbar pb-2">
                                             <table className="w-full text-left text-xs sm:text-sm min-w-[400px]">
                                                 <thead className="bg-slate-50 text-slate-500"><tr><th className="p-2 sm:p-3 rounded-l-lg">学生</th><th className="p-2 sm:p-3">原因</th><th className="p-2 sm:p-3">时间</th><th className="p-2 sm:p-3 rounded-r-lg">时长</th></tr></thead>
                                                 <tbody className="divide-y divide-slate-100">{agg.duration.longOut.length === 0 ? (<tr><td colSpan={4} className="p-4 text-center text-slate-400">暂无超时记录，表现很好！</td></tr>) : (agg.duration.longOut.map(l => (<tr key={l.id}><td className="p-2 sm:p-3 font-bold text-slate-700">{l.name}</td><td className="p-2 sm:p-3 text-slate-500">{l.reasonDisplay || l.reason}</td><td className="p-2 sm:p-3 text-slate-400">{formatDate(l.date)}</td><td className="p-2 sm:p-3 font-bold text-red-500">{l.duration} min</td></tr>)))}</tbody>
                                             </table>
                                         </div>
                                     </div>
                                 </div>
                               )}
                             </React.Fragment>
                           )}
                        </div>
                    </div>
                );
            };

            const renderAdmin = () => (
                <div className="h-full flex flex-col bg-slate-50 animate-in fade-in duration-300">
                    <div className="bg-slate-800 text-white p-4 sm:p-6 flex justify-between items-center shrink-0">
                        <h2 className="text-lg sm:text-2xl font-bold flex items-center gap-2 sm:gap-3"><Icon name="settings" size={20} className="sm:w-[24px] sm:h-[24px]" /> 新廊华小 - 后台管理</h2>
                        <button onClick={() => setView('landing')} className="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg sm:rounded-xl text-xs sm:text-sm font-bold">退出</button>
                    </div>
                    <div className="flex-grow p-4 sm:p-6 md:p-8 overflow-y-auto custom-scrollbar">
                        {!editingClass ? (
                            <div className="max-w-4xl mx-auto space-y-6 sm:space-y-8">
                                {/* 1. 系统设置 (上移) */}
                                <div className="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 p-5 sm:p-8 space-y-4 sm:space-y-6">
                                    <h3 className="text-lg sm:text-xl font-bold text-slate-700 flex items-center gap-2 mb-2 sm:mb-6"><Icon name="settings" size={18} className="sm:w-[20px] sm:h-[20px]" /> 系统功能</h3>
                                    
                                    {/* 考试模式 */}
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-3 sm:p-4 bg-slate-50 rounded-xl border gap-3 sm:gap-0">
                                        <div className="flex gap-3 items-center">
                                            <div className="p-2 bg-white rounded-full shadow-sm"><Icon name="lock" size={18} className="sm:w-[20px] sm:h-[20px]" /></div>
                                            <div><div className="font-bold text-sm sm:text-base">考试模式</div><div className="text-[10px] sm:text-xs text-slate-500">禁止学生外出</div></div>
                                        </div>
                                        <button onClick={()=>{setIsExamMode(!isExamMode); setGlobalModal({type:'alert', title:'成功', message:'设置已保存'})}} className={`w-full sm:w-auto px-4 py-2 rounded-lg text-sm sm:text-base font-bold transition-all ${isExamMode?'bg-red-600 text-white':'bg-slate-200'}`}>{isExamMode?'已开启':'已关闭'}</button>
                                    </div>

                                    {/* 绑定设备 */}
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-3 sm:p-4 bg-slate-50 rounded-xl border gap-3 sm:gap-0">
                                        <div className="flex gap-3 items-center">
                                            <div className="p-2 bg-white rounded-full shadow-sm"><Icon name="monitor" size={18} className="sm:w-[20px] sm:h-[20px]" /></div>
                                            <div><div className="font-bold text-sm sm:text-base">设备绑定</div><div className="text-[10px] sm:text-xs text-slate-500">选择此屏幕显示的班级</div></div>
                                        </div>
                                        <select onChange={(e)=>{if(e.target.value) handleAssignClass(e.target.value); e.target.value='';}} className="w-full sm:w-auto p-2 border rounded-lg text-sm sm:text-base max-w-full sm:max-w-[150px]">
                                            <option value="">+ 添加班级...</option>
                                            {classes.map(c => <option key={c.id} value={c.id} disabled={assignedClassIds.includes(c.id)}>{c.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex flex-wrap gap-2 px-2 sm:px-4">
                                        {assignedClassIds.map(id => { const c = classes.find(x=>x.id===id); return c ? <span key={id} onClick={()=>handleUnassignClass(id)} className="px-2 py-1 sm:px-3 sm:py-1 bg-blue-100 text-blue-700 rounded-full text-xs sm:text-sm font-bold flex gap-1 items-center cursor-pointer">{c.name} <Icon name="x" size={12} className="sm:w-[14px] sm:h-[14px]" /></span> : null; })}
                                    </div>

                                    {/* 数据管理 */}
                                    <div className="flex flex-col sm:flex-row gap-2 sm:gap-3 pt-4 border-t">
                                        <button onClick={handleExportData} className="flex-1 py-2.5 sm:py-3 bg-slate-100 rounded-lg sm:rounded-xl text-sm sm:text-base font-bold flex justify-center items-center gap-2"><Icon name="download" size={16} className="sm:w-[18px] sm:h-[18px]" /> 备份数据</button>
                                        <label className="flex-1 py-2.5 sm:py-3 bg-slate-100 rounded-lg sm:rounded-xl text-sm sm:text-base font-bold flex justify-center items-center gap-2 cursor-pointer"><Icon name="upload" size={16} className="sm:w-[18px] sm:h-[18px]" /> 恢复备份<input type="file" className="hidden" onChange={handleImportData}/></label>
                                    </div>
                                </div>

                                {/* 2. 班级列表 (下移) */}
                                <div className="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 p-5 sm:p-8">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 sm:mb-6 gap-3 sm:gap-0">
                                        <h3 className="text-lg sm:text-xl font-bold text-slate-700 flex items-center gap-2"><Icon name="users" size={18} className="sm:w-[20px] sm:h-[20px]" /> 班级列表 (Class List)</h3>
                                        <div className="flex gap-2 w-full sm:w-auto">
                                            {/* 同步云端名单按钮移至此处 */}
                                            <button onClick={fetchStudentsFromCloud} className="flex-1 sm:flex-none bg-yellow-100 hover:bg-yellow-200 text-yellow-700 px-3 sm:px-4 py-2 rounded-lg font-bold flex justify-center items-center gap-2 text-xs sm:text-sm transition-colors">
                                                <Icon name="cloud-download" size={14} className="sm:w-[16px] sm:h-[16px]" /> <span className="hidden sm:inline">同步云端名单</span><span className="sm:hidden">同步</span>
                                            </button>
                                            <button onClick={()=>{const newC={id:Date.now().toString(), name:'新班级', teacher:'Guru', students:[]}; setClasses([...classes,newC]); setEditingClass(newC);}} className="flex-1 sm:flex-none bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-bold flex justify-center items-center gap-2 text-sm sm:text-base transition-colors shadow-sm"><Icon name="plus" size={16} className="sm:w-[18px] sm:h-[18px]" /> 添加</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
                                        {classes.map(cls => (
                                            <div key={cls.id} className="bg-slate-50 p-3 sm:p-4 rounded-xl border border-slate-200 flex justify-between items-center group hover:border-blue-300 transition-all">
                                                <div className="min-w-0 pr-2">
                                                    <div className="font-bold text-base sm:text-lg truncate">{cls.name}</div>
                                                    <div className="text-slate-500 text-[10px] sm:text-sm truncate">{cls.teacher} • {cls.students.length} 人</div>
                                                </div>
                                                <div className="flex gap-1.5 sm:gap-2 shrink-0">
                                                    <button onClick={() => setEditingClass(cls)} className="p-1.5 sm:p-2 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200 transition-colors"><Icon name="pen-tool" size={16} className="sm:w-[18px] sm:h-[18px]" /></button>
                                                    <button onClick={() => handleDeleteClass(cls.id)} className="p-1.5 sm:p-2 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition-colors"><Icon name="trash-2" size={16} className="sm:w-[18px] sm:h-[18px]" /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            // 编辑班级界面
                            <div className="bg-white max-w-2xl mx-auto rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 p-5 sm:p-8 animate-in zoom-in-95">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 sm:mb-6 gap-3 sm:gap-0">
                                    <h3 className="text-xl sm:text-2xl font-bold text-slate-800">编辑班级: {editingClass.name}</h3>
                                    {/* 云端同步按钮已移除 */}
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 mb-4 sm:mb-6">
                                    <div><label className="block text-xs sm:text-sm font-bold text-slate-500 mb-1">班级名称</label><input value={editingClass.name} onChange={e=>setEditingClass({...editingClass, name:e.target.value})} className="w-full p-2 sm:p-3 border rounded-lg sm:rounded-xl font-bold text-sm sm:text-base focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all"/></div>
                                    <div><label className="block text-xs sm:text-sm font-bold text-slate-500 mb-1">班主任</label><input value={editingClass.teacher} onChange={e=>setEditingClass({...editingClass, teacher:e.target.value})} className="w-full p-2 sm:p-3 border rounded-lg sm:rounded-xl font-bold text-sm sm:text-base focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all"/></div>
                                </div>

                                <div className="mb-4 sm:mb-6">
                                    <div className="flex justify-between items-end mb-1 sm:mb-2">
                                        <label className="block text-xs sm:text-sm font-bold text-slate-500">学生名单 (每行一个)</label>
                                        <label className="text-blue-600 font-bold text-[10px] sm:text-sm cursor-pointer hover:underline flex items-center gap-1"><Icon name="upload" size={12} className="sm:w-[14px] sm:h-[14px]" /> 导入 CSV/TXT<input type="file" className="hidden" onChange={handleImportStudentCSV}/></label>
                                    </div>
                                    <textarea value={editingClass.students.join('\n')} onChange={e=>setEditingClass({...editingClass, students:e.target.value.split('\n')})} className="w-full h-48 sm:h-64 p-3 sm:p-4 border rounded-lg sm:rounded-xl font-mono text-xs sm:text-sm resize-none focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none custom-scrollbar transition-all" placeholder="Ali bin Abu&#10;Tan Xiao Ming&#10;..."></textarea>
                                    <p className="text-right text-[10px] sm:text-xs text-slate-400 mt-1 sm:mt-2">共 {editingClass.students.filter(s=>s.trim()).length} 名学生</p>
                                </div>

                                <div className="flex gap-3 sm:gap-4 flex-col sm:flex-row">
                                    <button onClick={() => setEditingClass(null)} className="flex-1 py-2.5 sm:py-3 bg-slate-100 text-slate-600 rounded-lg sm:rounded-xl text-sm sm:text-base font-bold hover:bg-slate-200 transition-colors">取消</button>
                                    <button onClick={() => { handleSaveClass(editingClass); setEditingClass(null); }} className="flex-1 py-2.5 sm:py-3 bg-blue-600 text-white rounded-lg sm:rounded-xl text-sm sm:text-base font-bold hover:bg-blue-700 shadow-md hover:shadow-lg transition-all active:scale-95">保存修改</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            // --- 路由渲染 ---
            return (
                <div className="w-full h-full relative">
                    {view === 'landing' && renderLanding()}
                    {view === 'admin' && renderAdmin()}
                    {view === 'dashboard' && renderDashboard()}
                    {view === 'history' && renderHistory()}
                    {view === 'attendance' && renderAttendance()}
                    {view === 'statistics' && renderStatistics()}
                    {renderGlobalModal()}
                    {renderCustomReasonModal()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
